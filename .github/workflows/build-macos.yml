name: Build macOS

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: brew install cmake ninja libomp zlib

    - name: Build (ARM64 only)
      run: |
        cmake -B build \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_OSX_ARCHITECTURES=arm64 \
          -DCMAKE_C_COMPILER=clang \
          -DCMAKE_CXX_COMPILER=clang++ \
          -DOpenMP_C_FLAGS="-Xpreprocessor -fopenmp -I$(brew --prefix libomp)/include" \
          -DOpenMP_CXX_FLAGS="-Xpreprocessor -fopenmp -I$(brew --prefix libomp)/include" \
          -DOpenMP_C_LIB_NAMES="omp" \
          -DOpenMP_CXX_LIB_NAMES="omp" \
          -DOpenMP_omp_LIBRARY=$(brew --prefix libomp)/lib/libomp.dylib \
          -G Ninja
        
        cmake --build build --config Release

    - name: Package
      run: |
        mkdir -p dist/spacerscope-macos-arm64
        cp build/spacerscope build/spacerscope-web dist/spacerscope-macos-arm64/
        chmod +x dist/spacerscope-macos-arm64/spacerscope*
        cd dist && zip -r spacerscope-macos-arm64.zip spacerscope-macos-arm64

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: spacerscope-macos-arm64
        path: dist/spacerscope-macos-arm64.zip

    - name: Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: dist/spacerscope-macos-arm64.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
