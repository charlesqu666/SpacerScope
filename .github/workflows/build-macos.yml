name: Build macOS

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [x86_64, arm64]
        include:
          - arch: x86_64
            cmake_args: "-DCMAKE_OSX_ARCHITECTURES=x86_64"
          - arch: arm64
            cmake_args: "-DCMAKE_OSX_ARCHITECTURES=arm64"

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        brew install cmake ninja libomp zlib

    - name: Configure CMake
      run: |
        cmake -B ${{github.workspace}}/build \
          -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} \
          -DCMAKE_C_COMPILER=clang \
          -DCMAKE_CXX_COMPILER=clang++ \
          -DOpenMP_C_FLAGS="-Xpreprocessor -fopenmp -I$(brew --prefix libomp)/include" \
          -DOpenMP_CXX_FLAGS="-Xpreprocessor -fopenmp -I$(brew --prefix libomp)/include" \
          -DOpenMP_C_LIB_NAMES="omp" \
          -DOpenMP_CXX_LIB_NAMES="omp" \
          -DOpenMP_omp_LIBRARY=$(brew --prefix libomp)/lib/libomp.dylib \
          ${{ matrix.cmake_args }} \
          -G Ninja

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}

    - name: Prepare artifacts
      run: |
        mkdir -p ${{github.workspace}}/dist/spacerscope-${{ matrix.arch }}
        cp ${{github.workspace}}/build/spacerscope ${{github.workspace}}/dist/spacerscope-${{ matrix.arch }}/
        cp ${{github.workspace}}/build/spacerscope-web ${{github.workspace}}/dist/spacerscope-${{ matrix.arch }}/
        
        # 复制依赖库（可选）
        chmod +x ${{github.workspace}}/dist/spacerscope-${{ matrix.arch }}/spacerscope
        chmod +x ${{github.workspace}}/dist/spacerscope-${{ matrix.arch }}/spacerscope-web

    - name: Create ZIP archive
      run: |
        cd ${{github.workspace}}/dist
        zip -r spacerscope-macos-${{ matrix.arch }}.zip spacerscope-${{ matrix.arch }}

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: spacerscope-macos-${{ matrix.arch }}
        path: ${{github.workspace}}/dist/spacerscope-macos-${{ matrix.arch }}.zip

  # 创建 Universal Binary (Intel + Apple Silicon)
  build-universal:
    runs-on: macos-latest
    needs: build-macos
    if: startsWith(github.ref, 'refs/tags/')

    steps:
    - uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: ${{github.workspace}}/artifacts

    - name: Create Universal Binary
      run: |
        mkdir -p ${{github.workspace}}/dist/spacerscope-universal
        
        # 解压两个架构的版本
        unzip ${{github.workspace}}/artifacts/spacerscope-macos-x86_64/spacerscope-macos-x86_64.zip -d ${{github.workspace}}/temp_x86_64
        unzip ${{github.workspace}}/artifacts/spacerscope-macos-arm64/spacerscope-macos-arm64.zip -d ${{github.workspace}}/temp_arm64
        
        # 创建通用二进制文件
        lipo -create \
          ${{github.workspace}}/temp_x86_64/spacerscope-x86_64/spacerscope \
          ${{github.workspace}}/temp_arm64/spacerscope-arm64/spacerscope \
          -output ${{github.workspace}}/dist/spacerscope-universal/spacerscope
        
        lipo -create \
          ${{github.workspace}}/temp_x86_64/spacerscope-x86_64/spacerscope-web \
          ${{github.workspace}}/temp_arm64/spacerscope-arm64/spacerscope-web \
          -output ${{github.workspace}}/dist/spacerscope-universal/spacerscope-web
        
        chmod +x ${{github.workspace}}/dist/spacerscope-universal/spacerscope
        chmod +x ${{github.workspace}}/dist/spacerscope-universal/spacerscope-web

    - name: Create Universal ZIP
      run: |
        cd ${{github.workspace}}/dist
        zip -r spacerscope-macos-universal.zip spacerscope-universal

    - name: Upload Universal artifact
      uses: actions/upload-artifact@v4
      with:
        name: spacerscope-macos-universal
        path: ${{github.workspace}}/dist/spacerscope-macos-universal.zip

  # 发布 Release
  release:
    runs-on: ubuntu-latest
    needs: [build-macos, build-universal]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: ${{github.workspace}}/artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ${{github.workspace}}/artifacts/spacerscope-macos-x86_64/spacerscope-macos-x86_64.zip
          ${{github.workspace}}/artifacts/spacerscope-macos-arm64/spacerscope-macos-arm64.zip
          ${{github.workspace}}/artifacts/spacerscope-macos-universal/spacerscope-macos-universal.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
